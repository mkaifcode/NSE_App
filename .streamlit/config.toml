[theme]
primaryColor = "#00d26a"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#131929"
textColor = "#e8eaf0"
font = "sans serif"

[server]
headless = true
port = 8501
# This app accepts uploads of demat / broker holdings CSVs. Both of these were
# disabled, which is a cross-site request forgery hole on any publicly
# reachable deployment (share.streamlit.io, Railway, etc).
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 5

[browser]
gatherUsageStats = false
